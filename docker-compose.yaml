# Local build/run via compose-helper (milestone 13). Primary dev workflow:
#
#   ./compose-helper.sh up      # build image -> start -> follow logs
#   ./compose-helper.sh stop    # stop; the data volume is KEPT
#   ./compose-helper.sh down    # stop AND delete the data volume (clean slate)
#
# Variables come from `.env` (see .env.example); compose-helper passes it with
# --env-file. An unset SECOND_BRAIN_WEB_SECRETS_KEY substitutes to empty, which
# the app treats as "not configured" (keyed provider profiles are refused until
# it is set).

services:
  second-brain-web:
    build:
      # The app source (and its Dockerfile) live under app/; docs and
      # compose-related files at the repo root stay out of the build context.
      context: ./app
    image: second-brain-web
    restart: unless-stopped
    ports:
      # Published to localhost by default. To let a TLS-terminating proxy on
      # another host/container (e.g. nginx-proxy-manager) reach it, set
      # SECOND_BRAIN_WEB_BIND to a LAN IP or 0.0.0.0 in .env.
      - '${SECOND_BRAIN_WEB_BIND:-127.0.0.1}:${SECOND_BRAIN_WEB_PORT:-8722}:8722'
    environment:
      SECOND_BRAIN_WEB_SECRETS_KEY: '${SECOND_BRAIN_WEB_SECRETS_KEY:-}'
      # production (image default) marks auth cookies Secure: login then works
      # on http://localhost and behind HTTPS, but NOT over plain http on a LAN
      # IP. Only relax this for LAN-without-TLS experiments.
      NODE_ENV: '${SECOND_BRAIN_WEB_NODE_ENV:-production}'
    volumes:
      - sbw-data:/data
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:8722/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Matches compose-helper's DCH_STOP_TIMEOUT default.
    stop_grace_period: 30s

volumes:
  sbw-data:
